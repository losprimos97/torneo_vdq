<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Equipos</title>
<link rel="stylesheet" href="style.css">

<style>

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
padding:20px;
margin:10% auto;
width:60%;
}

.close{
float:right;
font-size:20px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<nav>
<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="torneo.html">Torneo</a></li>
<li><a href="equipos.html">Equipos</a></li>
</ul>
</nav>
</header>

<h1>Equipos del torneo</h1>

<button onclick="abrirEquipo()">Equipo A</button>

<div id="equipoA" class="modal">

<div class="modal-content">

<span class="close" onclick="cerrarEquipo()">X</span>

<h2>Equipo A</h2>

<table>

<tr>
<th>#</th>
<th>Foto</th>
<th>Nombre</th>
<th>Edad</th>
</tr>

<tr>
<td>10</td>
<td>Foto</td>
<td>Juan Perez</td>
<td>22</td>
</tr>

<tr>
<td>7</td>
<td>Foto</td>
<td>Carlos Ruiz</td>
<td>21</td>
</tr>

</table>

</div>

</div>

<script>

function abrirEquipo(){
document.getElementById("equipoA").style.display="block";
}

function cerrarEquipo(){
document.getElementById("equipoA").style.display="none";
}

</script>

</body>
</html>
